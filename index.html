<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>OOTP Analyst</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
         font-size: 13px; background: #f5f5f5; color: #222; }
  .container { max-width: 1000px; margin: 24px auto; background: #fff;
               border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.12); overflow: hidden; }

  .page-header { background: #1a1a2e; color: #fff; padding: 20px 24px; }
  .page-title { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; }
  .active-save { font-size: 12px; color: #aaa; margin-top: 6px; }

  .section { padding: 16px 24px; border-top: 1px solid #eee; }
  .section-title { font-size: 11px; font-weight: 700; text-transform: uppercase;
                   letter-spacing: 0.8px; color: #555; margin-bottom: 10px; }

  table { border-collapse: collapse; width: 100%; font-size: 13px; }
  th { background: #2c2c3e; color: #fff; padding: 7px 10px; text-align: center;
       font-size: 11px; font-weight: 600; text-transform: uppercase;
       letter-spacing: 0.5px; white-space: nowrap; }
  td { padding: 6px 10px; text-align: center; vertical-align: middle;
       white-space: nowrap; border-bottom: 1px solid #eee; }
  tr:nth-child(even) td { background: #f9f9f9; }
  tr:hover td { background: #f0f4f8; }
  .left { text-align: left; }

  a { color: #2266cc; text-decoration: none; }
  a:hover { text-decoration: underline; }
  .stale { color: #cc7700; font-weight: bold; font-size: 12px; }
  .db-status { font-size: 11px; margin-right: 4px; cursor: default; }
  .db-status-ok { color: #2a7a2a; }
  .db-status-stale { color: #cc7700; }
  .ts { color: #888; }
  .empty { color: #aaa; font-style: italic; }

  .badge-oa  { display: inline-block; padding: 2px 8px; border-radius: 4px;
               background: #2266cc; color: white; font-weight: bold; font-size: 12px; }
  .badge-pot { display: inline-block; padding: 2px 8px; border-radius: 4px;
               background: #228844; color: white; font-weight: bold; font-size: 12px; }
  .badge-active { display: inline-block; padding: 1px 7px; border-radius: 10px;
                  background: #d4edda; color: #155724; font-size: 11px;
                  font-weight: 600; margin-left: 6px; vertical-align: middle; }
  .badge-team  { display: inline-block; padding: 1px 7px; border-radius: 4px;
                 background: #1a1a2e; color: #f0c040; font-size: 11px;
                 font-weight: 700; letter-spacing: 0.5px; }
  .btn-team-edit { background: none; border: none; color: #aaa; font-size: 17px;
                   cursor: pointer; padding: 0 3px; vertical-align: middle; }
  .btn-team-edit:hover { color: #2266cc; }
  .team-picker { display: inline-flex; gap: 4px; align-items: center; }
  .team-picker select { font-size: 11px; padding: 2px 4px; border: 1px solid #ccc;
                        border-radius: 3px; color: #222; }

  /* Update banner */
  .update-banner { background: #fff3cd; border-bottom: 1px solid #ffc107;
                   color: #856404; padding: 8px 24px; font-size: 12px; }
  .update-banner a { color: #856404; font-weight: 600; }
  .update-banner code { background: #ffeaa0; padding: 1px 4px; border-radius: 3px; }

  /* Status panel */
  .status-bar { display: flex; flex-wrap: wrap; gap: 6px; padding: 12px 24px;
                border-top: 1px solid #eee; align-items: center; }
  .status-bar-label { font-size: 11px; font-weight: 700; text-transform: uppercase;
                      letter-spacing: 0.8px; color: #555; margin-right: 4px; }
  .status-pill { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px;
                 border-radius: 20px; font-size: 11px; font-weight: 600; cursor: default; }
  .status-pill.ok  { background: #d4edda; color: #155724; }
  .status-pill.err { background: #f8d7da; color: #721c24; cursor: pointer; }
  .status-pill.err:hover { background: #f5c2c7; }

  .status-detail { display: none; padding: 10px 24px 14px;
                   border-top: 1px solid #eee; background: #fafafa; }
  .status-detail.open { display: block; }
  .status-detail table { font-size: 12px; }
  .status-detail td { padding: 4px 10px; text-align: left; border-bottom: 1px solid #eee; }
  .status-detail td:first-child { font-weight: 600; white-space: nowrap; }
  .fix-hint { color: #856404; font-family: monospace; font-size: 11px;
              background: #fff3cd; padding: 2px 6px; border-radius: 3px; }

  /* Action buttons */
  .btn-delete { background: none; border: 1px solid #ddd; border-radius: 4px;
                color: #aaa; font-size: 11px; padding: 2px 8px; cursor: pointer; line-height: 1.4; }
  .btn-delete:hover { border-color: #e74c3c; color: #e74c3c; background: #fff5f5; }

  .btn-action { background: none; border: 1px solid #2266cc; border-radius: 4px;
                color: #2266cc; font-size: 11px; padding: 2px 8px; cursor: pointer;
                line-height: 1.4; margin-left: 4px; }
  .btn-action:hover { background: #e8f0ff; }
  .btn-action:disabled { opacity: 0.5; cursor: default; }
  .btn-action.secondary { border-color: #888; color: #555; }
  .btn-action.secondary:hover { background: #f0f0f0; border-color: #555; }

  /* Split refresh button */
  .btn-refresh-wrap { display: inline-flex; border-radius: 4px; overflow: hidden;
                      border: 1px solid #2266cc; }
  .btn-refresh-wrap button { background: none; border: none; cursor: pointer;
                              font-size: 11px; line-height: 1.4; color: #2266cc; }
  .btn-refresh      { padding: 2px 8px; }
  .btn-refresh:hover { background: #e8f0ff; }
  .btn-refresh-arrow { padding: 2px 6px; border-left: 1px solid #2266cc; }
  .btn-refresh-arrow:hover { background: #e8f0ff; }
  .btn-refresh-wrap:disabled, .btn-refresh-wrap.busy button { opacity: 0.5; cursor: default; }

  /* Dropdown */
  .refresh-menu { position: absolute; background: #fff; border: 1px solid #ccc;
                  border-radius: 4px; box-shadow: 0 2px 8px rgba(0,0,0,0.15);
                  z-index: 100; min-width: 160px; }
  .refresh-menu button { display: block; width: 100%; text-align: left; background: none;
                         border: none; padding: 8px 12px; font-size: 12px; cursor: pointer; }
  .refresh-menu button:hover { background: #f0f4ff; }

  /* Saves section */
  .save-not-imported td { color: #888; }
  .save-import-form { display: flex; gap: 8px; margin-top: 12px; align-items: center; }
  .save-import-form input { flex: 1; padding: 5px 8px; border: 1px solid #ccc;
                             border-radius: 4px; font-size: 12px; color: #222; }
  .save-import-form input:focus { outline: none; border-color: #2266cc; }
  .save-import-form label { font-size: 11px; color: #666; white-space: nowrap; }

  /* Spinner for running imports */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner { display: inline-block; width: 10px; height: 10px; border: 2px solid #ccc;
             border-top-color: #2266cc; border-radius: 50%;
             animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 4px; }

  /* Generate report bar */
  .generate-bar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .generate-bar select { padding: 5px 8px; border: 1px solid #ccc; border-radius: 4px;
                          font-size: 12px; color: #222; background: #fff; cursor: pointer; }
  .generate-bar select:focus { outline: none; border-color: #2266cc; }
  .gen-fields { display: flex; gap: 8px; flex: 1; flex-wrap: wrap; }
  .gen-fields input { flex: 1; min-width: 140px; padding: 5px 8px; border: 1px solid #ccc;
                       border-radius: 4px; font-size: 12px; color: #222; }
  .gen-fields input:focus { outline: none; border-color: #2266cc; }

  /* Discovered saves collapsible */
  .discovered-details { margin-top: 10px; }
  .discovered-details summary { font-size: 11px; color: #2266cc; cursor: pointer;
                                 padding: 4px 2px; user-select: none; }
  .discovered-details summary:hover { text-decoration: underline; }
  .discovered-details table { margin-top: 6px; }

  /* Import log panel */
  .import-log { margin-top: 12px; border: 1px solid #ddd; border-radius: 4px; overflow: hidden; }
  .import-log-header { background: #2c2c3e; color: #ccc; padding: 8px 12px;
                       font-size: 13px; font-weight: 600; display: flex;
                       justify-content: space-between; align-items: center; gap: 8px; }
  .import-log-header .log-title { color: #7ec8e3; flex: 1; }
  .import-log-header .log-status { color: #aaa; }
  .import-log-header .log-controls { display: flex; gap: 6px; }
  .import-log-header .log-controls button {
    background: none; border: 1px solid #555; border-radius: 3px; color: #ccc;
    font-size: 12px; padding: 3px 8px; cursor: pointer; line-height: 1.4; }
  .import-log-header .log-controls button:hover { border-color: #aaa; color: #fff; }
  .import-log-body { background: #1e1e1e; color: #d4d4d4; font-family: monospace;
                     font-size: 11px; padding: 8px 10px; max-height: 220px;
                     overflow-y: auto; white-space: pre-wrap; word-break: break-all; }
  .import-log-body.minimized { display: none; }
  .import-log-body.maximized { min-height: 60vh; max-height: 80vh; }
  .import-log-body.rendered { white-space: normal; word-break: normal; }
  .log-line { white-space: pre-wrap; font-family: monospace; font-size: 11px; min-height: 1.2em; }
  .log-table { border-collapse: collapse; margin: 6px 0; font-size: 11px; font-family: monospace; }
  .log-table th { background: #3a3a4e; color: #9ec8e3; padding: 4px 10px; text-align: left;
                  font-size: 10px; font-weight: 600; text-transform: uppercase;
                  letter-spacing: 0.4px; border: 1px solid #444; white-space: nowrap; }
  .log-table td { padding: 3px 10px; color: #d4d4d4; border: 1px solid #333; text-align: left; white-space: nowrap; }
  .log-table tr:nth-child(even) td { background: #252530; }
  .log-table tr:hover td { background: #3a3a50; color: #fff; }
</style>
</head>
<body>
<div class="container">
  <div class="page-header">
    <div class="page-title">OOTP Analyst</div>
    <div class="active-save" id="active-save">Loading…</div>
  </div>
  <div id="update-banner" class="update-banner" style="display:none"></div>
  <div id="status-bar" class="status-bar"><span style="color:#aaa;font-size:12px">Checking prerequisites…</span></div>
  <div id="status-detail" class="status-detail"></div>
  <div id="saves-section" class="section"></div>
  <div class="section" id="generate-section">
    <div class="section-title">Generate Report</div>
    <div class="generate-bar">
      <select id="gen-skill" onchange="updateGenFields()">
        <option value="player-stats">Player Stats</option>
        <option value="player-rating">Player Rating</option>
        <option value="contract-extension">Contract Extension</option>
        <option value="waiver-claim">Waiver Claim</option>
        <option value="free-agents">Free Agents</option>
        <option value="draft-targets">Draft Targets</option>
        <option value="trade-targets">Trade Targets</option>
        <option value="lineup-optimizer">Lineup Optimizer</option>
        <option value="adhoc">Ad-hoc Query</option>
      </select>
      <div id="gen-fields" class="gen-fields"></div>
      <button id="gen-btn" class="btn-action" onclick="generateReport()">▶ Run</button>
    </div>
    <div id="job-logs"></div>
  </div>
  <div class="section" id="search-section">
    <div class="section-title">Search Reports</div>
    <div class="generate-bar">
      <input type="search" id="report-search-q" placeholder="Search report text (all words must match)"
        style="flex:1;min-width:200px;padding:5px 8px;border:1px solid #ccc;border-radius:4px;font-size:12px;color:#222"
        onkeydown="if(event.key==='Enter')runReportSearch()">
      <label style="font-size:11px;color:#666;white-space:nowrap;display:inline-flex;align-items:center;gap:4px">
        <input type="checkbox" id="report-search-all-saves"> All saves
      </label>
      <button type="button" class="btn-action" onclick="runReportSearch()">Search</button>
      <button type="button" class="btn-action secondary" onclick="clearReportSearch()">Clear</button>
    </div>
    <div id="report-search-results" style="margin-top:12px"></div>
  </div>
  <div id="content"></div>
</div>

<script>
async function tryFetch(url, opts) {
  try {
    const r = await fetch(url, opts);
    return r.ok ? await r.text() : null;
  } catch(e) { return null; }
}

function parseSubdirs(html) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(html, 'text/html');
  return [...doc.querySelectorAll('a[href]')]
    .map(a => a.getAttribute('href'))
    .filter(h => h.endsWith('/') && !h.startsWith('?') && !h.startsWith('/') && h !== '../');
}

function parseHtmlLinks(html) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(html, 'text/html');
  return [...doc.querySelectorAll('a[href]')]
    .map(a => a.getAttribute('href'))
    .filter(h => h.endsWith('.html') && !h.startsWith('?') && !h.startsWith('/') && !h.startsWith('http'));
}

function unescHtml(s) {
  return s ? s.replace(/&quot;/g, '"').replace(/&#39;/g, "'").replace(/&amp;/g, '&').replace(/&lt;/g, '<').replace(/&gt;/g, '>') : s;
}

function extractMeta(html) {
  const title  = (html.match(/<title>(.*?)<\/title>/) || [])[1] || null;
  const ts     = (html.match(/Generated: ([\d\-T:]+)/) || html.match(/ootp-generated" content="([\d\-T:]+)"/) || [])[1] || null;
  const oa     = (html.match(/\bOA (\d+)/) || [])[1] || null;
  const pot    = (html.match(/\bPOT (\d+)/) || [])[1] || null;
  const skill  = (html.match(/<meta name="ootp-skill" content="([^"]+)"/) || [])[1] || null;
  const args   = unescHtml((html.match(/<meta name="ootp-args" content="([^"]+)"/) || [])[1] || null);
  const kwargs = unescHtml((html.match(/<meta name="ootp-kwargs" content="([^"]+)"/) || [])[1] || null);
  return { title, ts, oa, pot, skill, args, kwargs };
}

function dirLabel(key) {
  return key.replace(/[-_]/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
}

document.addEventListener('click', () => {
  document.querySelectorAll('.refresh-menu').forEach(m => m.remove());
});

// ---------------------------------------------------------------------------
// Saves section
// ---------------------------------------------------------------------------

let _savePollTimer = null;
let _lastRunningKey = null;
let _lastActiveKey = null;
let _lastSavesKey = null;
let _prevRunningCount = null;

async function loadSaves() {
  const r = await fetch('/saves');
  if (!r.ok) return;
  const data = await r.json();

  const runningKey = JSON.stringify(data.running);
  const activeKey = data.active || '';
  const savesKey = JSON.stringify(Object.fromEntries(Object.entries(data.saves).map(([k, v]) => [k, (v.csv_mtime || '') + '|' + (v.my_team_id || '')])));
  const structureChanged = runningKey !== _lastRunningKey || activeKey !== _lastActiveKey || savesKey !== _lastSavesKey;
  _lastRunningKey = runningKey;
  _lastActiveKey = activeKey;
  _lastSavesKey = savesKey;

  if (structureChanged || !document.querySelector('#saves-section .section-title')) {
    renderSaves(data);
    autoDetectMyTeam(data.saves);
  } else {
    const logs = data.logs || {};
    const missingPanel = Object.keys(logs).some(name => {
      if (!logs[name].length) return false;
      const id = 'log-' + name.replace(/[^a-z0-9]/gi, '_');
      return !document.getElementById('logpanel-' + id);
    });
    if (missingPanel) renderSaves(data);
    else updateLogsInPlace(logs);
  }

  // Update header
  const activeEl = document.getElementById('active-save');
  if (data.active) {
    const last = data.saves[data.active] && data.saves[data.active].last_import;
    activeEl.textContent = 'Active save: ' + data.active + (last ? '  •  Last import: ' + last : '');
  } else {
    activeEl.textContent = 'No active save';
  }

  // Poll every 1s while imports are running; reload reports when they finish
  const wasRunning = _prevRunningCount !== null && _prevRunningCount > 0;
  const nowRunning = data.running.length > 0;
  _prevRunningCount = data.running.length;
  clearTimeout(_savePollTimer);
  if (nowRunning) {
    _savePollTimer = setTimeout(loadSaves, 1000);
  } else {
    _savePollTimer = setTimeout(loadSaves, 30_000);  // idle: check every 30s for new CSV exports
    if (wasRunning) reloadReports();
  }
}

function renderSaves(data) {
  const el = document.getElementById('saves-section');
  const { active, saves, discovered, running, logs = {} } = data;

  // Imported saves rows
  const importedRows = Object.entries(saves).map(([name, info]) => {
    const isActive = name === active;
    const isRunning = running.includes(name);
    const nameCell = isActive
      ? `★ <strong>${esc(name)}</strong><span class="badge-active">Active</span>`
      : esc(name);
    const csvNewer = info.csv_mtime && info.last_import && info.csv_mtime > info.last_import;
    const hasCsvInfo = info.csv_mtime && info.last_import;
    const dbStatus = hasCsvInfo
      ? (csvNewer
          ? `<span class="db-status db-status-stale" title="New CSV data available">⚠</span>`
          : `<span class="db-status db-status-ok" title="Database is up to date">✓</span>`)
      : '';
    const actions = isRunning
      ? `<button class="btn-action" disabled><span class="spinner"></span>Importing…</button>`
      : buildImportBtn(name, isActive, csvNewer);
    const cellId = `my-team-cell-${name.replace(/[^a-z0-9]/gi, '_')}`;
    const myTeamCell = info.my_team_id
      ? `<span class="badge-team">${esc(info.my_team_abbr || '')}</span><button class="btn-team-edit" onclick="pickMyTeam(${jsStr(name)})" title="Change team">✎</button>`
      : `<span class="ts">—</span>`;
    return `<tr>
      <td class="left">${nameCell}</td>
      <td>${dbStatus}${esc(info.db_name)}</td>
      <td class="ts">${info.last_import || '—'}</td>
      <td id="${esc(cellId)}">${myTeamCell}</td>
      <td>${actions}</td>
    </tr>`;
  });

  // Discovered-only rows (not yet imported, but may be running)
  const discoveredRows = Object.entries(discovered)
    .filter(([name]) => running.includes(name))  // always show if currently importing
    .concat(Object.entries(discovered).filter(([name]) => !running.includes(name)))
    .map(([name]) => {
      const isRunning = running.includes(name);
      const actions = isRunning
        ? `<button class="btn-action" disabled><span class="spinner"></span>Importing…</button>`
        : `<button class="btn-action" onclick="importSave(${jsStr(name)})">Import</button>`;
      return `<tr class="save-not-imported">
        <td class="left">${esc(name)}</td>
        <td>—</td>
        <td class="ts">—</td>
        <td></td>
        <td>${actions}</td>
      </tr>`;
    });

  const hasImported = importedRows.length > 0;
  const thead = `<tr><th class="left">Save</th><th>Database</th><th>Last Import</th><th>My Team</th><th></th></tr>`;

  // If nothing at all found
  if (!importedRows.length && !discoveredRows.length) {
    var table = `<span class="empty">No saves found. Run <code>./import.sh list</code> to discover saves.</span>`;
  } else if (!hasImported) {
    // Nothing imported yet — show everything flat
    var table = `<table>${thead}${discoveredRows.join('')}</table>`;
  } else {
    // Imported saves always visible; discovered collapsed unless any are running
    const runningDiscovered = Object.keys(discovered).filter(n => running.includes(n));
    const collapsedOpen = runningDiscovered.length > 0 ? ' open' : '';
    const discoveredSection = discoveredRows.length || true  // always show when imported saves exist
      ? `<details class="discovered-details"${collapsedOpen}>
          <summary>${discoveredRows.length} more save${discoveredRows.length !== 1 ? 's' : ''} available to import</summary>
          ${discoveredRows.length ? `<table>${thead}${discoveredRows.join('')}</table>` : ''}
          <div class="save-import-form">
            <label>Import by name or path:</label>
            <input type="text" id="save-input" placeholder="e.g. My-Save-2026 or /path/to/Save.lg">
            <button class="btn-action" onclick="importFromInput()">Import</button>
          </div>
        </details>`
      : '';
    var table = `<table>${thead}${importedRows.join('')}</table>${discoveredSection}`;
  }

  // Build log panels for any save with output (running or just finished)

  const logPanels = Object.entries(logs).map(([name, lines]) => {
    if (!lines.length) return '';
    const id = 'log-' + name.replace(/[^a-z0-9]/gi, '_');
    const status = running.includes(name) ? 'Importing…' : 'Done';
    const logText = lines.map(l => colorLogLine(l)).join('\n');
    return `<div class="import-log" id="logpanel-${id}">
      <div class="import-log-header">
        <span class="log-title">${esc(name)}</span>
        <span class="log-status">${status}</span>
        <span class="log-controls">
          <button onclick="logCopy('${id}')" title="Copy log" id="copy-${id}">⎘</button>
          <button onclick="logMinimize('${id}')" title="Minimize">−</button>
          <button onclick="logMaximize('${id}')" title="Maximize">⤢</button>
          <button onclick="logClose('${id}', ${jsStr(name)})" title="Close"${running.includes(name) ? ' disabled' : ''}>✕</button>
        </span>
      </div>
      <div class="import-log-body" id="${id}">${logText}</div>
    </div>`;
  }).join('');

  el.innerHTML = `
    <div class="section-title">Saves</div>
    ${table}
    ${logPanels}`;

  // When no imported saves yet, add the import form outside the collapsible
  if (!hasImported) {
    el.innerHTML += `<div class="save-import-form" style="margin-top:12px">
      <label>Import by name or path:</label>
      <input type="text" id="save-input" placeholder="e.g. My-Save-2026 or /path/to/Save.lg">
      <button class="btn-action" onclick="importFromInput()">Import</button>
    </div>`;
  }

  // Auto-scroll log panels to bottom
  el.querySelectorAll('.import-log-body').forEach(el => { el.scrollTop = el.scrollHeight; });
}

function buildImportBtn(name, isActive, csvNewer) {
  const setActiveBtn = `<button class="btn-action secondary" onclick="setActive(${jsStr(name)})">Set Active</button>`;
  const refreshBtn = `<button class="btn-action" onclick="importSave(${jsStr(name)})">↻ Refresh</button>`;
  if (!csvNewer) return isActive ? '' : setActiveBtn;
  return isActive ? refreshBtn : setActiveBtn + refreshBtn;
}

// ---------------------------------------------------------------------------
// My Team auto-detect + picker
// ---------------------------------------------------------------------------

async function autoDetectMyTeam(savesData) {
  const needsDetect = Object.entries(savesData).filter(([, info]) => !info.my_team_id);
  for (const [name] of needsDetect) {
    const r = await fetch(`/saves/my-team-candidates?save=${encodeURIComponent(name)}`);
    if (!r.ok) continue;
    const resp = await r.json();
    if (resp.auto_set) {
      loadSaves();  // server wrote my_team_id; re-fetch with updated data
      return;
    }

function renderInline(s) {
  s = s.replace(/\*\*([^*\n]+)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/(?<!\*)\*([^*\n]+)\*(?!\*)/g, '<em>$1</em>');
  return s;
}

function parseMdTableRow(line) {
  const parts = line.split('|');
  return parts.slice(1, parts.length - 1).map(c => c.trim());
}

function renderMdTable(lines) {
  const isSep = l => /^\s*\|[\s\-:|]+\|\s*$/.test(l);
  const data = lines.filter(l => !isSep(l));
  if (!data.length) return '';
  const [hdr, ...body] = data;
  const ths = parseMdTableRow(hdr).map(c => `<th>${renderInline(esc(c))}</th>`).join('');
  const trs = body.map(r =>
    '<tr>' + parseMdTableRow(r).map(c => `<td>${renderInline(esc(c))}</td>`).join('') + '</tr>'
  ).join('');
  return `<table class="log-table"><thead><tr>${ths}</tr></thead><tbody>${trs}</tbody></table>`;
}

function renderMarkdownLog(lines) {
  const out = [];
  let i = 0;
  while (i < lines.length) {
    const line = lines[i];
    if (line.trim().startsWith('|')) {
      const tbl = [];
      while (i < lines.length && lines[i].trim().startsWith('|')) tbl.push(lines[i++]);
      out.push(renderMdTable(tbl));
    } else {
      out.push(`<div class="log-line">${renderInline(colorLogLine(line))}</div>`);
      i++;
    }
  }
  return out.join('');
}

function colorLogLine(raw) {
  const s = esc(raw);
  if (/Error:|^error:/i.test(raw))      return `<span style="color:#f47c7c">${s}</span>`;
  if (/⚠|skipped\s*\(/.test(raw))      return `<span style="color:#f0c060">${s}</span>`;
  if (/^✓/.test(raw))                   return `<span style="color:#6dbb6d">${s}</span>`;
  if (/^Done:/.test(raw))               return `<span style="color:#fff;font-weight:bold">${s}</span>`;
  if (/^Created database:/.test(raw))   return `<span style="color:#7ec8e3">${s}</span>`;
  if (/^\s+(PK|IX) /.test(raw))        return `<span style="color:#777">${s}</span>`;
  return s;
}

function esc(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// Wrap a string as a single-quoted JS literal safe for use inside onclick="..."
function jsStr(s) {
  return "'" + String(s).replace(/\\/g, '\\\\').replace(/'/g, "\\'") + "'";
}

async function refreshReport(filePath, mode, kwargsEncoded) {
  const wrap = [...document.querySelectorAll('.btn-refresh-wrap')].find(el => el.dataset.path === filePath);
  const mainBtn = wrap && wrap.querySelector('.btn-refresh');
  if (mainBtn) { mainBtn.textContent = 'Refreshing…'; mainBtn.disabled = true; }
  if (wrap) wrap.classList.add('busy');

  let kwargs = null;
  if (kwargsEncoded) {
    try { kwargs = JSON.parse(kwargsEncoded); } catch(e) {}
  }

  const r = await fetch('/refresh', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ path: filePath, mode, kwargs_override: kwargs }),
  });

  if (!r.ok) {
    if (wrap) wrap.classList.remove('busy');
    if (mainBtn) { mainBtn.textContent = '↻ Refresh'; mainBtn.disabled = false; }
    alert('Refresh failed: ' + await r.text());
    return;
  }

  const { job_id } = await r.json();
  const label = mode === 'full' ? 'Data + Analysis' : 'Data refresh';
  _jobData[job_id] = { skill: 'refresh', args: label, log: [], running: true, file_path: filePath };
  listenToJob(job_id, async () => {
    if (wrap) { wrap.classList.remove('busy'); wrap.remove(); }
    const html = await tryFetch(filePath, { cache: 'no-store' });
    if (html) {
      const meta = extractMeta(html);
      const row = document.getElementById('row-' + CSS.escape(filePath));
      if (row) {
        const tsCell = row.querySelector('.ts');
        const staleCell = row.querySelector('.stale-cell');
        const previousTs = tsCell ? tsCell.textContent : '';
        if (meta.ts) {
          if (tsCell) tsCell.textContent = meta.ts;
          if (staleCell && meta.ts !== previousTs) staleCell.innerHTML = '';
        }
      }
    }
  });
}

function buildRefreshBtn(filePath, kwargsEncoded) {
  return `<span class="btn-refresh-wrap" data-path="${esc(filePath)}" data-kwargs="${esc(kwargsEncoded || '')}">
    <button class="btn-refresh" onclick="refreshFromWrap(this,'data')">↻ Refresh</button>
    <button class="btn-refresh-arrow" onclick="showRefreshMenu(event,this)">▾</button>
  </span>`;
}

function refreshFromWrap(btn, mode) {
  const wrap = btn.closest('.btn-refresh-wrap');
  refreshReport(wrap.dataset.path, mode, wrap.dataset.kwargs);
}

function showRefreshMenu(e, btn) {
  e.stopPropagation();
  document.querySelectorAll('.refresh-menu').forEach(m => m.remove());
  const wrap = btn.closest('.btn-refresh-wrap');
  const filePath = wrap.dataset.path;
  const kwargsEncoded = wrap.dataset.kwargs;
  const menu = document.createElement('div');
  menu.className = 'refresh-menu';
  menu.style.cssText = `position:absolute;top:${btn.getBoundingClientRect().bottom + scrollY}px;left:${btn.getBoundingClientRect().left}px`;
  const addItem = (label, mode) => {
    const item = document.createElement('button');
    item.textContent = label;
    item.onclick = () => { document.querySelectorAll('.refresh-menu').forEach(m => m.remove()); refreshReport(filePath, mode, kwargsEncoded); };
    menu.appendChild(item);
  };
  addItem('↻ Data only (fast)', 'data');
  addItem('✦ Data + Analysis (slow)', 'full');
  document.body.appendChild(menu);
}

async function buildSection(basePath, dirKey, lastImport) {
  const listing = await tryFetch(basePath + dirKey);
  if (!listing) return null;

  const links = parseHtmlLinks(listing);
  if (links.length === 0) return null;

  const reports = await Promise.all(links.map(async link => {
    const filename = link.split('/').pop();
    const html = await tryFetch(basePath + dirKey + filename, { cache: 'no-cache' });
    const meta = html ? extractMeta(html) : {};
    return { filename, ...meta };
  }));

  reports.sort((a, b) => {
    if (!a.ts && !b.ts) return a.filename.localeCompare(b.filename);
    if (!a.ts) return 1;
    if (!b.ts) return -1;
    return b.ts.localeCompare(a.ts);
  });

  const showRatings = reports.some(r => r.oa || r.pot);
  const extraTh = showRatings ? '<th>OA</th><th>POT</th>' : '';

  const rows = reports.map(rpt => {
    const stale = lastImport && rpt.ts && lastImport > rpt.ts;
    const staleCell = stale
      ? (rpt.skill ? buildRefreshBtn(basePath + dirKey + rpt.filename, rpt.kwargs) : '<span class="stale">STALE</span>')
      : '';
    const extraTd = showRatings
      ? `<td>${rpt.oa ? `<span class="badge-oa">${rpt.oa}</span>` : '—'}</td>`
      + `<td>${rpt.pot ? `<span class="badge-pot">${rpt.pot}</span>` : '—'}</td>`
      : '';
    const displayTitle = rpt.title || rpt.filename.replace('.html', '').replace(/[-_]/g, ' ');
    const filePath = `${basePath}${dirKey}${rpt.filename}`;
    return `<tr id="row-${CSS.escape(filePath)}">
      <td class="left"><a href="${filePath}" target="_blank">${displayTitle}</a></td>
      ${extraTd}
      <td class="ts">${rpt.ts || '—'}</td>
      <td class="stale-cell">${staleCell}</td>
      <td><button class="btn-delete" onclick="deleteReport('${filePath}')">Delete</button></td>
    </tr>`;
  }).join('');

  return `<div class="section">
    <div class="section-title">${dirLabel(dirKey.replace(/\/$/, ''))}</div>
    <table>
      <tr><th class="left">Report</th>${extraTh}<th>Generated</th><th></th><th></th></tr>
      ${rows}
    </table>
  </div>`;
}

async function deleteReport(filePath) {
  const r = await fetch(filePath, { method: 'DELETE' });
  if (r.ok) {
    const row = document.getElementById('row-' + CSS.escape(filePath));
    if (row) row.remove();
  } else {
    alert('Delete failed: ' + r.status);
  }
}

async function loadStatus() {
  const bar = document.getElementById('status-bar');
  const detail = document.getElementById('status-detail');

  const data = await tryFetch('/status');
  if (!data) {
    bar.innerHTML = '<span style="color:#aaa;font-size:12px">Status unavailable (not served via web-server.sh?)</span>';
    return;
  }

  const checks = JSON.parse(data);
  const allOk = checks.every(c => c.ok);

  bar.innerHTML = '<span class="status-bar-label">Prerequisites</span>'
    + checks.map(c => {
        const cls = c.ok ? 'ok' : 'err';
        const icon = c.ok ? '✓' : '✗';
        const tip = c.ok ? '' : ' title="Click for fix"';
        return `<span class="status-pill ${cls}"${tip} onclick="toggleStatus()">${icon} ${c.name}</span>`;
      }).join('');

  if (!allOk) {
    bar.innerHTML += ' <span style="font-size:11px;color:#721c24;margin-left:4px">— click a red item for details</span>';
  }

  const rows = checks.map(c => {
    const icon = c.ok ? '<span style="color:#155724">✓</span>' : '<span style="color:#721c24">✗</span>';
    const fix = c.fix ? `<br><span class="fix-hint">→ ${c.fix}</span>` : '';
    return `<tr>
      <td>${icon} ${c.name}</td>
      <td>${c.detail || '—'}${fix}</td>
    </tr>`;
  }).join('');

  detail.innerHTML = `<table>${rows}</table>`;

  if (!allOk) detail.classList.add('open');
}

function toggleStatus() {
  document.getElementById('status-detail').classList.toggle('open');
}

const _activeStreams = {};  // job_id -> EventSource
const _jobData = {};        // job_id -> { skill, args, log[], running }

function _jobPanelId(jobId) {
  return 'job-' + jobId.replace(/[^a-z0-9]/gi, '_');
}

function _renderJobPanelContent(jobId) {
  const job = _jobData[jobId];
  if (!job) return '';
  const id = _jobPanelId(jobId);
  const status = job.running ? 'Running…' : 'Done';
  const logText = renderMarkdownLog(job.log);
  const label = job.skill === 'refresh'
    ? `↻ ${esc(job.args)}`
    : `${GEN_SKILLS[job.skill]?.label || job.skill}: ${esc(job.args)}`;
  return `<div class="import-log-header">
      <span class="log-title">${label}</span>
      <span class="log-status" id="status-${id}">${status}</span>
      <span class="log-controls">
        <button onclick="logCopy('${id}')" title="Copy log" id="copy-${id}">⎘</button>
        <button onclick="logMinimize('${id}')" title="Minimize">−</button>
        <button onclick="logMaximize('${id}')" title="Maximize">⤢</button>
        <button onclick="clearJob('${id}', ${jsStr(jobId)})" title="Close"${job.running ? ' disabled' : ''} id="close-${id}">✕</button>
      </span>
    </div>
    <div class="import-log-body rendered" id="${id}">${logText || '<span style="color:#666">Starting…</span>'}</div>`;
}

function _renderJobPanel(jobId) {
  const id = _jobPanelId(jobId);
  return `<div class="import-log" id="logpanel-${id}">${_renderJobPanelContent(jobId)}</div>`;
}

function _appendJobLine(jobId, line) {
  const id = _jobPanelId(jobId);
  const body = document.getElementById(id);
  if (!body) return;
  const nearBottom = body.scrollHeight - body.scrollTop - body.clientHeight < 50;
  body.innerHTML = renderMarkdownLog(_jobData[jobId].log);
  if (nearBottom) body.scrollTop = body.scrollHeight;
}

function _markJobDone(jobId) {
  if (_jobData[jobId]) _jobData[jobId].running = false;
  const id = _jobPanelId(jobId);
  const statusEl = document.getElementById('status-' + id);
  if (statusEl) statusEl.textContent = 'Done';
  const closeBtn = document.getElementById('close-' + id);
  if (closeBtn) closeBtn.disabled = false;
}

function _openJobPanel(jobId) {
  const id = _jobPanelId(jobId);
  if (document.getElementById('logpanel-' + id)) return;

  const job = _jobData[jobId];
  const filePath = job && job.file_path;
  if (filePath) {
    const row = document.getElementById('row-' + CSS.escape(filePath));
    if (row) {
      const tr = document.createElement('tr');
      tr.id = 'logpanel-' + id;
      const td = document.createElement('td');
      td.colSpan = 10;
      td.style.padding = '0';
      td.innerHTML = `<div class="import-log">${_renderJobPanelContent(jobId)}</div>`;
      tr.appendChild(td);
      row.insertAdjacentElement('afterend', tr);
      const body = tr.querySelector('.import-log-body');
      if (body) body.scrollTop = body.scrollHeight;
      return;
    }
  }

  const el = document.getElementById('job-logs');
  el.insertAdjacentHTML('afterbegin', _renderJobPanel(jobId));
  const body = document.getElementById(id);
  if (body) body.scrollTop = body.scrollHeight;
}

function listenToJob(jobId, onDone) {
  if (_activeStreams[jobId]) return;
  _openJobPanel(jobId);

  const es = new EventSource(`/reports/jobs/${encodeURIComponent(jobId)}/stream`);
  _activeStreams[jobId] = es;

  es.onmessage = (e) => {
    if (e.data === '[DONE]') {
      es.close();
      delete _activeStreams[jobId];
      _markJobDone(jobId);
      if (onDone) onDone(); else reloadReports();
      return;
    }
    try {
      const line = JSON.parse(e.data);
      if (_jobData[jobId]) {
        _jobData[jobId].log.push(line);
        _appendJobLine(jobId, line);
      }
    } catch(err) {}
  };

  es.onerror = () => {
    es.close();
    delete _activeStreams[jobId];
    _markJobDone(jobId);
    if (!onDone) reloadReports();
  };
}

async function generateReport() {
  const skill = document.getElementById('gen-skill').value;
  const args = buildArgs(skill);
  if (args === null) { alert('Please fill in the required fields.'); return; }

  const btn = document.getElementById('gen-btn');
  btn.disabled = true;

  const r = await fetch('/reports/generate', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ skill, args }),
  });

  btn.disabled = false;
  if (!r.ok) { alert('Failed to start: ' + await r.text()); return; }

  const { job_id } = await r.json();
  _jobData[job_id] = { skill, args, log: [], running: true };
  listenToJob(job_id);
}

async function startJobPolling() {
  // On page load: fetch existing jobs once, attach SSE to any still running
  const jobs = await fetch('/reports/jobs').then(r => r.ok ? r.json() : {});
  for (const [jobId, job] of Object.entries(jobs)) {
    _jobData[jobId] = { ...job };
    if (job.running) {
      listenToJob(jobId);
    } else {
      _openJobPanel(jobId);
    }
  }
}

function clearReportSearch() {
  const input = document.getElementById('report-search-q');
  const out = document.getElementById('report-search-results');
  if (input) input.value = '';
  if (out) out.innerHTML = '';
}

async function runReportSearch() {
  const input = document.getElementById('report-search-q');
  const out = document.getElementById('report-search-results');
  const q = (input && input.value || '').trim();
  if (!q) {
    out.innerHTML = '<span class="empty">Enter a search query.</span>';
    return;
  }
  out.innerHTML = '<span class="ts">Searching…</span>';
  const params = new URLSearchParams({ q });
  if (_lastActiveKey) params.set('save', _lastActiveKey);
  const allSaves = document.getElementById('report-search-all-saves');
  if (allSaves && allSaves.checked) params.set('all_saves', '1');
  let r;
  try {
    r = await fetch('/reports/search?' + params.toString());
  } catch (e) {
    out.innerHTML = '<span class="stale">Search failed (network).</span>';
    return;
  }
  let data;
  try {
    data = await r.json();
  } catch (e) {
    out.innerHTML = '<span class="stale">Invalid response.</span>';
    return;
  }
  if (!r.ok) {
    const err = data && data.error ? data.error : r.status;
    out.innerHTML = '<span class="stale">Search failed: ' + esc(String(err)) + '</span>';
    return;
  }
  const results = data.results || [];
  if (!results.length) {
    out.innerHTML = '<span class="empty">No matches.</span>';
    return;
  }
  const rows = results.map(hit => {
    const title = hit.title || hit.path.split('/').pop().replace(/\.html$/, '').replace(/[-_]/g, ' ');
    const cat = hit.category ? '<span class="ts"> · ' + esc(dirLabel(hit.category)) + '</span>' : '';
    const href = encodeURI(hit.path);
    return '<tr><td class="left"><a href="' + href + '" target="_blank">' + esc(title) + '</a>' + cat + '</td></tr>';
  }).join('');
  out.innerHTML =
    '<table style="margin-top:8px;width:100%"><tr><th class="left">Match</th></tr>' + rows + '</table>';
}

async function reloadReports() {
  const savesData = await fetch('/saves').then(r => r.ok ? r.json() : null);
  const active = savesData && savesData.active;
  const lastImport = active && savesData.saves[active]?.last_import || null;
  const reportsBase = active ? `reports/${encodeURIComponent(active)}/` : 'reports/';
  const listing = await tryFetch(reportsBase);
  const subdirs = listing ? parseSubdirs(listing) : [];
  const sections = await Promise.all(subdirs.map(d => buildSection(reportsBase, d, lastImport)));
  const html = sections.filter(Boolean).join('');
  document.getElementById('content').innerHTML =
    html || '<div class="section"><span class="empty">No reports yet.</span></div>';
}

async function checkUpdates() {
  const data = await tryFetch('/git-status');
  if (!data) return;
  let updates_available, install_type;
  try {
    ({ updates_available, install_type } = JSON.parse(data));
  } catch (e) {
    return;
  }
  if (!updates_available) return;
  const banner = document.getElementById('update-banner');
  if (install_type === 'zip') {
    banner.innerHTML = '⚠ A new version is available — <a href="https://github.com/rwalker123/ootp-db/archive/refs/heads/main.zip">download the latest zip</a>.';
  } else {
    banner.innerHTML = '⚠ A new version is available — run <code>git pull</code> to update.';
  }
  banner.style.display = '';
}

async function main() {
  checkUpdates();     // fire and forget — shows banner if .update-status says so
  updateGenFields();  // populate initial skill fields
  loadSaves();    // fire and forget — updates header + saves section, starts poll if needed
  loadStatus();   // fire and forget

  const savesData = await fetch('/saves').then(r => r.ok ? r.json() : null);
  const active = savesData && savesData.active;
  const lastImport = active && savesData.saves[active] && savesData.saves[active].last_import || null;

  const reportsBase = active ? `reports/${encodeURIComponent(active)}/` : 'reports/';
  const reportsListing = await tryFetch(reportsBase);
  const subdirs = reportsListing ? parseSubdirs(reportsListing) : [];
  const sections = await Promise.all(subdirs.map(d => buildSection(reportsBase, d, lastImport)));
  const html = sections.filter(Boolean).join('');

  document.getElementById('content').innerHTML =
    html || '<div class="section"><span class="empty">No reports yet.</span></div>';

  startJobPolling();  // pick up any jobs left from a previous page load — must run after rows exist
}

main();
</script>
