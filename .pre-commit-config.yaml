repos:
  - repo: local
    hooks:
      - id: no-commit-to-main
        name: Don't commit directly to main
        entry: scripts/check-branch.sh
        language: script
        pass_filenames: false
        always_run: true
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
